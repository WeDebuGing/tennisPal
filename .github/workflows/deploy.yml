name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python deps
        run: pip install -r api/requirements.txt
      - name: Run tests
        run: cd api && python -m pytest tests/ -v
      - name: Build frontend
        run: cd frontend && npm ci && npx tsc -b && npx vite build

  deploy-dev:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to dev
        uses: appleboy/ssh-action@v1
        with:
          host: 72.61.12.118
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/tennispal-dev/scripts/deploy.sh --env dev --branch ${{ github.head_ref }}

  deploy-prod:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to prod
        uses: appleboy/ssh-action@v1
        with:
          host: 72.61.12.118
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/tennispal/scripts/deploy.sh --env prod

  deploy-manual:
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ${{ inputs.environment }}
        uses: appleboy/ssh-action@v1
        with:
          host: 72.61.12.118
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ "${{ inputs.environment }}" = "prod" ]; then
              /opt/tennispal/scripts/deploy.sh --env prod
            else
              /opt/tennispal-dev/scripts/deploy.sh --env dev
            fi
