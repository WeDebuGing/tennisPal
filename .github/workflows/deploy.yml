name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 72.61.12.118
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/tennispal
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            cd frontend
            npm install
            npx vite build
            cd ..
            systemctl restart tennispal
